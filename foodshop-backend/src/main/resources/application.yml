server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/foodshop
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

app:
  security:
    jwt-secret: "12345678901234567890123456789012"
    jwt-expiration-mins: 120
